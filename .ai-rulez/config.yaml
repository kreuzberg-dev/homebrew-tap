$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/ai-rules-v3.schema.json
includes:
  - name: kreuzberg-core
    source: https://github.com/kreuzberg-dev/ai-rulez.git
    path: modules/core
    merge_strategy: local-override
version: "3.0"
name: homebrew-tap
description: Homebrew tap with formulas for kreuzberg-dev CLI tools
gitignore: true

builtins:
  - ruby
  - git-workflow
  - code-quality
  - default-commands

presets:
  - claude
  - codex
  - copilot
  - cursor
  - antigravity
